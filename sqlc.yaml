version: "2"
sql:
  - engine: "postgresql"
    queries: "./database/queries/user.sql"
    schema: "./database/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/user/repository/sqlc"
        emit_json_tags: true
  - engine: "postgresql"
    queries: "./database/queries/campaign.sql"
    schema: "./database/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/campaign/repository/sqlc"
        emit_json_tags: true
        overrides:
          - column: "public.campaigns.current_amount"
            go_type:
              type: "float32"
              pointer: true
          - column: "public.campaigns.target_amount"
            go_type:
              type: "float32"
              pointer: true
          - column: "public.campaigns.description"
            go_type:
              type: "string"
              pointer: true
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "pg_catalog.numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              type: "Decimal"
  - engine: "postgresql"
    queries: "./database/queries/payment.sql"
    schema: "./database/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/payment/repository/sqlc"
        emit_json_tags: true
        overrides:
          # - column: "public.campaigns.current_amount"
          #   go_type:
          #     type: "float32"
          #     pointer: true
          # - column: "public.campaigns.target_amount"
          #   go_type:
          #     type: "float32"
          #     pointer: true
          # - column: "public.campaigns.description"
          #   go_type:
          #     type: "string"
          #     pointer: true
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "pg_catalog.numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              type: "Decimal"
